<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>15 Line Quran – IbadahHub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); min-height:100vh; font-family:'Inter',sans-serif; }

    .view { display:none; }
    .view.active { display:block; }

    /* ══ LANDING ══ */
    .landing-wrap { padding-bottom:40px; }

    .land-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px;
      padding-top:calc(env(safe-area-inset-top,16px) + 10px);
      background:var(--bg);
    }

    .hero-card {
      background:linear-gradient(135deg,#2d5016,#1a3a0a);
      border-radius:var(--radius-lg);
      padding:28px 20px;
      text-align:center;
      margin:0 16px 16px;
      position:relative; overflow:hidden;
    }

    .hero-card::before {
      content:'📗';
      position:absolute;
      font-size:110px; opacity:0.05;
      right:-10px; bottom:-10px;
    }

    .hero-icon { font-size:48px; margin-bottom:12px; }

    .hero-title {
      font-size:24px; font-weight:800;
      color:white; margin-bottom:6px;
      letter-spacing:-0.5px;
    }

    .hero-sub { font-size:14px; color:rgba(255,255,255,0.6); }

    .resume-card {
      background:white;
      border-radius:var(--radius-lg);
      padding:18px 20px;
      box-shadow:var(--shadow);
      margin:0 16px 12px;
      display:flex; align-items:center; gap:14px;
      cursor:pointer; transition:transform 0.15s;
      border-left:4px solid var(--green);
      -webkit-user-select:none; user-select:none;
    }

    .resume-card:active { transform:scale(0.98); }

    .resume-icon {
      font-size:28px; width:52px; height:52px;
      background:#e6f9ec; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }

    .resume-body { flex:1; }

    .resume-label {
      font-size:11px; font-weight:700;
      color:var(--green);
      text-transform:uppercase; letter-spacing:0.5px;
      margin-bottom:4px;
    }

    .resume-title {
      font-size:17px; font-weight:800;
      color:var(--text); margin-bottom:2px;
    }

    .resume-sub { font-size:13px; color:var(--text-secondary); }

    .action-btn {
      background:white;
      border-radius:var(--radius-lg);
      padding:18px 20px;
      box-shadow:var(--shadow);
      margin:0 16px 12px;
      display:flex; align-items:center; gap:16px;
      cursor:pointer; transition:transform 0.15s;
      -webkit-user-select:none; user-select:none;
      border:none; width:calc(100% - 32px);
      text-align:left; font-family:'Inter',sans-serif;
    }

    .action-btn:active { transform:scale(0.98); }

    .action-icon {
      width:52px; height:52px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:26px; flex-shrink:0;
    }

    .action-body { flex:1; }
    .action-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:3px; }
    .action-sub { font-size:13px; color:var(--text-secondary); }
    .action-arrow { font-size:20px; color:var(--text-light); }

    /* ══ READER ══ */
    #view-reader {
      position:fixed; inset:0;
      background:#fff; z-index:50;
      display:none;
    }

    #view-reader.active { display:block; }

    .reader-page-area {
      width:100%; height:100vh;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; position:relative; background:#fff;
    }

    .quran-img {
      width:100%; height:100vh;
      object-fit:contain; display:block;
      -webkit-user-select:none; user-select:none;
      background:#fff;
    }

    .quran-img.hidden { display:none; }

    .reader-loading {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; background:#fff;
    }

    .reader-loading.hidden { display:none; }

    .r-spinner {
      width:36px; height:36px;
      border:3px solid rgba(0,0,0,0.12);
      border-top-color:#2d5016;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform:rotate(360deg); } }
    .r-loading-text { font-size:14px; color:rgba(0,0,0,0.4); }

    .reader-topbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      background:rgba(30,60,15,0.92);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      padding:10px 16px;
      padding-top:calc(env(safe-area-inset-top,16px) + 8px);
      display:flex; align-items:center; justify-content:space-between;
      transition:transform 0.3s ease, opacity 0.3s ease;
    }

    .reader-topbar.hidden {
      transform:translateY(-100%); opacity:0; pointer-events:none;
    }

    .r-topbar-center { text-align:center; flex:1; }
    .r-topbar-title { font-size:15px; font-weight:700; color:white; }
    .r-topbar-sub { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }

    .r-topbar-btn {
      width:36px; height:36px; border-radius:50%;
      background:rgba(255,255,255,0.12);
      border:none; color:white; font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:background 0.15s;
      -webkit-user-select:none; user-select:none;
    }

    .r-topbar-btn:active { background:rgba(255,255,255,0.25); }

    .reader-bottombar {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      background:rgba(30,60,15,0.92);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      padding:10px 20px;
      padding-bottom:calc(env(safe-area-inset-bottom,12px) + 10px);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      transition:transform 0.3s ease, opacity 0.3s ease;
    }

    .reader-bottombar.hidden {
      transform:translateY(100%); opacity:0; pointer-events:none;
    }

    .r-nav-btn {
      width:50px; height:50px; border-radius:50%;
      background:rgba(255,255,255,0.12);
      border:none; color:white; font-size:24px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; -webkit-user-select:none; user-select:none;
      transition:background 0.15s;
    }

    .r-nav-btn:active { background:rgba(255,255,255,0.25); }
    .r-nav-btn:disabled { opacity:0.25; pointer-events:none; }

    .r-page-info { flex:1; text-align:center; }
    .r-page-num { font-size:20px; font-weight:800; color:white; letter-spacing:-0.5px; }
    .r-page-of { font-size:11px; color:rgba(255,255,255,0.4); margin-top:2px; }

    .r-bm-btn {
      position:fixed; right:14px;
      top:calc(env(safe-area-inset-top,16px) + 60px);
      z-index:99; width:40px; height:40px;
      border-radius:50%;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.15);
      color:white; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }

    .r-bm-btn.on { background:#ff9500; border-color:#ff9500; }
    .r-bm-btn:active { transform:scale(0.88); }

    .r-surah-ind {
      position:fixed; left:14px;
      top:calc(env(safe-area-inset-top,16px) + 60px);
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:6px 10px; z-index:99;
      transition:opacity 0.3s;
    }

    .r-surah-ind-text { font-size:11px; color:rgba(255,255,255,0.8); font-weight:600; }

    /* ══ BOOKMARKS ══ */
    .bm-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px;
      padding-top:calc(env(safe-area-inset-top,16px) + 10px);
      background:var(--bg);
      position:sticky; top:0; z-index:10;
    }

    .bm-count-badge {
      background:var(--green); color:white;
      font-size:12px; font-weight:700;
      padding:3px 10px; border-radius:50px;
    }

    .bm-item {
      background:white; border-radius:var(--radius);
      padding:16px 18px; box-shadow:var(--shadow);
      margin:0 16px 10px;
      display:flex; align-items:center; gap:14px;
      cursor:pointer; transition:transform 0.15s;
      -webkit-user-select:none; user-select:none;
    }

    .bm-item:active { transform:scale(0.98); }

    .bm-page-badge {
      width:52px; height:52px; border-radius:14px;
      background:linear-gradient(135deg,#2d5016,#1a3a0a);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; flex-shrink:0;
    }

    .bm-page-label { font-size:10px; color:rgba(255,255,255,0.6); font-weight:600; }
    .bm-page-num { font-size:18px; font-weight:800; color:white; line-height:1; }

    .bm-item-body { flex:1; }

    .bm-surah-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px; }

    .bm-datetime {
      font-size:12px; color:var(--text-secondary);
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    }

    .bm-delete-btn {
      width:32px; height:32px; border-radius:50%;
      background:var(--bg); border:none; color:var(--red);
      font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; flex-shrink:0;
    }

    .bm-delete-btn:active { background:#ffe8e8; }

    .bm-empty {
      text-align:center; padding:60px 24px;
      color:var(--text-secondary);
    }

    .bm-empty-icon { font-size:56px; margin-bottom:16px; opacity:0.4; }
    .bm-empty-title { font-size:18px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .bm-empty-text { font-size:14px; line-height:1.6; }

    /* ══ MODALS ══ */
    .slide-modal {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.5); z-index:200;
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }

    .slide-modal.show { opacity:1; pointer-events:all; }

    .slide-modal-box {
      background:white; border-radius:24px 24px 0 0;
      width:100%; max-height:82vh; overflow-y:auto;
      transform:translateY(100%); transition:transform 0.3s ease;
      padding-bottom:calc(env(safe-area-inset-bottom,20px) + 20px);
    }

    .slide-modal.show .slide-modal-box { transform:translateY(0); }

    .slide-modal-sticky {
      position:sticky; top:0; background:white;
      padding:16px 20px 12px;
      border-bottom:1px solid var(--border); z-index:1;
    }

    .slide-handle {
      width:36px; height:4px; background:var(--border);
      border-radius:50px; margin:0 auto 14px;
    }

    .slide-title { font-size:18px; font-weight:700; text-align:center; margin-bottom:12px; }

    .slide-search {
      width:100%; padding:10px 14px; border-radius:10px;
      border:1px solid var(--border); font-size:15px;
      background:var(--bg); outline:none; font-family:'Inter',sans-serif;
    }

    .surah-row {
      display:flex; align-items:center;
      padding:14px 20px; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background 0.15s; gap:14px;
    }

    .surah-row:active { background:var(--bg); }

    .surah-num {
      width:36px; height:36px; border-radius:10px;
      background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700; color:var(--text-secondary); flex-shrink:0;
    }

    .surah-info { flex:1; }
    .surah-name-en { font-size:15px; font-weight:700; color:var(--text); }

    .surah-name-ar {
      font-size:14px; color:var(--text-secondary);
      font-family:'Scheherazade New',serif;
    }

    .surah-page-lbl { font-size:12px; color:var(--green); font-weight:600; }

    .juz-row {
      display:flex; align-items:center;
      padding:16px 20px; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background 0.15s; gap:14px;
    }

    .juz-row:active { background:var(--bg); }

    .juz-num {
      width:46px; height:46px; border-radius:12px;
      background:linear-gradient(135deg,#2d5016,#1a3a0a);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:800; color:white; flex-shrink:0;
    }

    .juz-info { flex:1; }
    .juz-title { font-size:15px; font-weight:700; color:var(--text); }
    .juz-sub { font-size:12px; color:var(--text-secondary); margin-top:2px; }
    .juz-page-lbl { font-size:13px; font-weight:700; color:var(--green); }

    .goto-modal-bg {
      position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:300;
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }

    .goto-modal-bg.show { opacity:1; pointer-events:all; }

    .goto-modal-box {
      background:#1c1c1e; border-radius:24px 24px 0 0;
      padding:20px;
      padding-bottom:calc(env(safe-area-inset-bottom,20px) + 20px);
      width:100%; transform:translateY(100%); transition:transform 0.3s ease;
    }

    .goto-modal-bg.show .goto-modal-box { transform:translateY(0); }

    .goto-handle {
      width:36px; height:4px; background:rgba(255,255,255,0.2);
      border-radius:50px; margin:0 auto 18px;
    }

    .goto-title { font-size:17px; font-weight:700; color:white; text-align:center; margin-bottom:16px; }

    .goto-input {
      width:100%; padding:14px; border-radius:12px; border:none;
      background:rgba(255,255,255,0.1); color:white;
      font-size:20px; font-weight:700; text-align:center;
      font-family:'Inter',sans-serif; outline:none; margin-bottom:12px;
    }

    .goto-input::placeholder { color:rgba(255,255,255,0.3); }

    .toast {
      position:fixed; bottom:90px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(28,28,30,0.95); color:white;
      padding:12px 22px; border-radius:50px;
      font-size:14px; font-weight:500; z-index:9999;
      opacity:0; transition:all 0.3s ease;
      white-space:nowrap; pointer-events:none;
    }

    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .swipe-hint {
      position:fixed; bottom:90px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7); color:rgba(255,255,255,0.9);
      padding:8px 18px; border-radius:50px;
      font-size:12px; font-weight:500; z-index:51;
      pointer-events:none; white-space:nowrap; opacity:0;
      animation:hintShow 4s ease 1.5s forwards;
    }

    @keyframes hintShow {
      0%{opacity:0;}15%{opacity:1;}75%{opacity:1;}100%{opacity:0;}
    }
  </style>
</head>
<body>

<!-- ══ VIEW: LANDING ══ -->
<div class="view active" id="view-landing">
  <div class="landing-wrap">
    <div class="land-header">
      <button class="back-btn" onclick="location.href='quran.html'">←</button>
      <div style="font-size:17px;font-weight:700;">15 Line Quran</div>
    </div>

    <div class="hero-card">
      <div class="hero-icon">📗</div>
      <div class="hero-title">15 Line Quran</div>
      <div class="hero-sub">Pakistani Mushaf — 15 Lines per Page</div>
    </div>

    <div class="resume-card" id="resume-card" style="display:none;" onclick="resumeReading()">
      <div class="resume-icon">▶️</div>
      <div class="resume-body">
        <div class="resume-label">▶ Resume Reading</div>
        <div class="resume-title" id="resume-title">Page 1</div>
        <div class="resume-sub" id="resume-sub">Tap to continue</div>
      </div>
      <div style="font-size:22px;color:var(--text-light);">›</div>
    </div>

    <button class="action-btn" id="start-btn" onclick="openReader(1)" style="display:none;">
      <div class="action-icon" style="background:#e6f9ec;">📗</div>
      <div class="action-body">
        <div class="action-title">Start Reading</div>
        <div class="action-sub">Begin from Page 1</div>
      </div>
      <div class="action-arrow">›</div>
    </button>

    <button class="action-btn" onclick="openSurahModal()">
      <div class="action-icon" style="background:#e6f9ec;">🔍</div>
      <div class="action-body">
        <div class="action-title">Open by Surah</div>
        <div class="action-sub">Jump to any Surah directly</div>
      </div>
      <div class="action-arrow">›</div>
    </button>

    <button class="action-btn" onclick="openJuzModal()">
      <div class="action-icon" style="background:#f0f9e8;">📋</div>
      <div class="action-body">
        <div class="action-title">Juz List</div>
        <div class="action-sub">Navigate by Juz (Para)</div>
      </div>
      <div class="action-arrow">›</div>
    </button>

    <button class="action-btn" onclick="showView('view-bookmarks'); renderBookmarks();">
      <div class="action-icon" style="background:#f3e8ff;">🔖</div>
      <div class="action-body">
        <div class="action-title">Bookmarks</div>
        <div class="action-sub" id="bm-sub-text">No bookmarks yet</div>
      </div>
      <div class="action-arrow">›</div>
    </button>

    <div style="height:30px;"></div>
  </div>
</div>

<!-- ══ VIEW: READER ══ -->
<div id="view-reader" class="view">
  <div class="reader-topbar" id="r-topbar">
    <button class="r-topbar-btn" onclick="closeReader()">←</button>
    <div class="r-topbar-center">
      <div class="r-topbar-title">15 Line Quran</div>
      <div class="r-topbar-sub" id="r-topbar-sub">Page 1 of 604</div>
    </div>
    <button class="r-topbar-btn" onclick="openGoto()">⊞</button>
  </div>

  <button class="r-bm-btn" id="r-bm-btn" onclick="toggleBookmark()">🔖</button>

  <div class="r-surah-ind" id="r-surah-ind">
    <div class="r-surah-ind-text" id="r-surah-text">Al-Fatihah</div>
  </div>

  <div class="reader-page-area" onclick="toggleControls()">
    <div class="reader-loading" id="r-loading">
      <div class="r-spinner"></div>
      <div class="r-loading-text">Loading page...</div>
    </div>
    <img class="quran-img hidden" id="r-img"
      onload="onImgLoad()" onerror="onImgError()"/>
  </div>

  <div class="swipe-hint">← Swipe to turn pages</div>

  <div class="reader-bottombar" id="r-bottombar">
    <button class="r-nav-btn" id="r-btn-prev" onclick="prevPage()">›</button>
    <div class="r-page-info">
      <div class="r-page-num" id="r-page-num">1</div>
      <div class="r-page-of">of 604</div>
    </div>
    <button class="r-nav-btn" id="r-btn-next" onclick="nextPage()">‹</button>
  </div>
</div>

<!-- ══ VIEW: BOOKMARKS ══ -->
<div class="view" id="view-bookmarks" style="min-height:100vh;padding-bottom:40px;">
  <div class="bm-header">
    <button class="back-btn" onclick="showView('view-landing'); checkResume();">←</button>
    <div style="font-size:17px;font-weight:700;flex:1;">Bookmarks</div>
    <div class="bm-count-badge" id="bm-count-badge">0</div>
  </div>
  <div id="bm-list" style="padding-top:8px;"></div>
</div>

<!-- SURAH MODAL -->
<div class="slide-modal" id="surah-modal" onclick="closeSurahModal(event)">
  <div class="slide-modal-box">
    <div class="slide-modal-sticky">
      <div class="slide-handle"></div>
      <div class="slide-title">Select Surah</div>
      <input class="slide-search" id="surah-search"
        placeholder="🔍 Search surah..." oninput="filterSurahs()"/>
    </div>
    <div id="surah-list"></div>
  </div>
</div>

<!-- JUZ MODAL -->
<div class="slide-modal" id="juz-modal" onclick="closeJuzModal(event)">
  <div class="slide-modal-box">
    <div class="slide-modal-sticky">
      <div class="slide-handle"></div>
      <div class="slide-title">Select Juz (Para)</div>
    </div>
    <div id="juz-list"></div>
  </div>
</div>

<!-- GOTO MODAL -->
<div class="goto-modal-bg" id="goto-modal" onclick="closeGoto(event)">
  <div class="goto-modal-box">
    <div class="goto-handle"></div>
    <div class="goto-title">Go to Page</div>
    <input class="goto-input" id="goto-input"
      type="number" min="1" max="604" placeholder="1 – 604"/>
    <button class="btn btn-primary btn-full" onclick="goToPage()">Go</button>
    <button class="btn btn-gray btn-full" style="margin-top:8px;color:#333;"
      onclick="closeGoto()">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const TOTAL = 604;
let currentPage = 1;
let controlsOn = true;
let touchStartX = 0;
let touchStartY = 0;

const surahData = [
  {n:1,  en:'Al-Fatihah',     ar:'الفاتحة',      page:1},
  {n:2,  en:'Al-Baqarah',     ar:'البقرة',        page:2},

// ── VIEW MANAGEMENT ──
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── LANDING ──
function checkResume() {
  const saved = localStorage.getItem('quran15line_page');
  const resumeCard = document.getElementById('resume-card');
  const startBtn = document.getElementById('start-btn');

  if (saved && parseInt(saved) > 1) {
    resumeCard.style.display = 'flex';
    startBtn.style.display = 'none';
    const surah = getSurahForPage(parseInt(saved));
    document.getElementById('resume-title').textContent = 'Page ' + saved + ' — ' + surah;
    document.getElementById('resume-sub').textContent = 'Continue where you left off';
  } else {
    resumeCard.style.display = 'none';
    startBtn.style.display = 'flex';
  }

  const bms = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  document.getElementById('bm-sub-text').textContent = bms.length > 0
    ? bms.length + ' saved bookmark' + (bms.length > 1 ? 's' : '')
    : 'No bookmarks yet';
}

function resumeReading() {
  const saved = parseInt(localStorage.getItem('quran15line_page') || '1');
  openReader(saved);
}

// ── READER ──
function openReader(p) {
  showView('view-reader');
  controlsOn = true;
  loadPage(p);
}

function closeReader() {
  showView('view-landing');
  checkResume();
}

function getSurahForPage(p) {
  let idx = 0;
  for (let i = 0; i < surahData.length; i++) {
    if (surahData[i].page <= p) idx = i;
    else break;
  }
  return surahData[idx].en;
}

function loadPage(p) {
  if (p < 1) p = 1;
  if (p > TOTAL) p = TOTAL;
  currentPage = p;

  localStorage.setItem('quran15line_page', currentPage);

  document.getElementById('r-page-num').textContent = currentPage;
  document.getElementById('r-topbar-sub').textContent = 'Page ' + currentPage + ' of ' + TOTAL;
  document.getElementById('r-surah-text').textContent = getSurahForPage(currentPage);
  document.getElementById('r-btn-next').disabled = currentPage <= 1;
  document.getElementById('r-btn-prev').disabled = currentPage >= TOTAL;

  const img = document.getElementById('r-img');
  img.classList.add('hidden');
  document.getElementById('r-loading').classList.remove('hidden');
  img.src = `https://cdn.jsdelivr.net/npm/the-amazing-quran-images/images/${currentPage}.png`;
  updateBmBtn();
}

function onImgLoad() {
  document.getElementById('r-loading').classList.add('hidden');
  document.getElementById('r-img').classList.remove('hidden');
}

function onImgError() {
  const img = document.getElementById('r-img');
  const padded = String(currentPage).padStart(3,'0');
  if (!img.src.includes('archive.org')) {
    img.src = `https://archive.org/download/ALQURANPERPAGEFORMATPNG/page${padded}.png`;
  } else {
    document.getElementById('r-loading').innerHTML =
      `<div style="color:rgba(0,0,0,0.4);text-align:center;padding:30px;font-size:14px;">
        Could not load page.<br>Check internet connection.</div>`;
  }
}

function nextPage() { if (currentPage > 1) loadPage(currentPage - 1); }
function prevPage() { if (currentPage < TOTAL) loadPage(currentPage + 1); }

function toggleControls() {
  controlsOn = !controlsOn;
  document.getElementById('r-topbar').classList.toggle('hidden', !controlsOn);
  document.getElementById('r-bottombar').classList.toggle('hidden', !controlsOn);
  document.getElementById('r-bm-btn').style.opacity = controlsOn ? '1' : '0';
  document.getElementById('r-surah-ind').style.opacity = controlsOn ? '1' : '0';
}

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive:true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (document.getElementById('view-reader').classList.contains('active')) {
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx > 0) prevPage(); else nextPage();
    }
  }
}, { passive:true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nextPage();
  if (e.key === 'ArrowRight') prevPage();
});

function openGoto() {
  document.getElementById('goto-modal').classList.add('show');
  setTimeout(() => document.getElementById('goto-input').focus(), 350);
}

function closeGoto(e) {
  if (!e || e.target === document.getElementById('goto-modal')) {
    document.getElementById('goto-modal').classList.remove('show');
  }
}

function goToPage() {
  const v = parseInt(document.getElementById('goto-input').value);
  if (v >= 1 && v <= TOTAL) {
    loadPage(v);
    closeGoto();
    document.getElementById('goto-input').value = '';
  } else {
    showToast('Enter a page between 1 and 604');
  }
}

// ── BOOKMARKS ──
function toggleBookmark() {
  const bms = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  const idx = bms.findIndex(b => b.page === currentPage);
  if (idx === -1) {
    const now = new Date();
    bms.push({
      page: currentPage,
      surah: getSurahForPage(currentPage),
      date: now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'}),
      time: now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})
    });
    showToast('🔖 Page ' + currentPage + ' bookmarked!');
  } else {
    if (!confirm('Remove bookmark for page ' + currentPage + '?')) return;
    bms.splice(idx, 1);
    showToast('Bookmark removed');
  }
  localStorage.setItem('quran15bookmarks', JSON.stringify(bms));
  updateBmBtn();
}

function updateBmBtn() {
  const bms = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  document.getElementById('r-bm-btn').classList.toggle('on', bms.some(b => b.page === currentPage));
}

function renderBookmarks() {
  const bms = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  const list = document.getElementById('bm-list');
  document.getElementById('bm-count-badge').textContent = bms.length;

  if (bms.length === 0) {
    list.innerHTML = `
      <div class="bm-empty">
        <div class="bm-empty-icon">🔖</div>
        <div class="bm-empty-title">No Bookmarks Yet</div>
        <div class="bm-empty-text">Open the reader and tap 🔖 to save a page.</div>
      </div>`;
    return;
  }

  const sorted = [...bms].reverse();
  list.innerHTML = sorted.map(b => `
    <div class="bm-item" onclick="openReader(${b.page})">
      <div class="bm-page-badge">
        <div class="bm-page-label">PAGE</div>
        <div class="bm-page-num">${b.page}</div>
      </div>
      <div class="bm-item-body">
        <div class="bm-surah-name">${b.surah}</div>
        <div class="bm-datetime">
          <span>📅 ${b.date}</span>
          <span>🕐 ${b.time}</span>
        </div>
      </div>
      <button class="bm-delete-btn"
        onclick="event.stopPropagation(); deleteBookmark(${b.page})">🗑</button>
    </div>
  `).join('');
}

function deleteBookmark(page) {
  if (!confirm('Delete bookmark for page ' + page + '?')) return;
  let bms = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  bms = bms.filter(b => b.page !== page);
  localStorage.setItem('quran15bookmarks', JSON.stringify(bms));
  renderBookmarks();
  showToast('Bookmark deleted');
}

// ── SURAH MODAL ──
function openSurahModal() {
  document.getElementById('surah-modal').classList.add('show');
  renderSurahs(surahData);
}

function closeSurahModal(e) {
  if (!e || e.target === document.getElementById('surah-modal')) {
    document.getElementById('surah-modal').classList.remove('show');
  }
}

function filterSurahs() {
  const q = document.getElementById('surah-search').value.toLowerCase();
  const filtered = surahData.filter(s =>
    s.en.toLowerCase().includes(q) || s.ar.includes(q) || String(s.n).includes(q)
  );
  renderSurahs(filtered);
}

function renderSurahs(list) {
  document.getElementById('surah-list').innerHTML = list.map(s => `
    <div class="surah-row" onclick="selectSurah(${s.page})">
      <div class="surah-num">${s.n}</div>
      <div class="surah-info">
        <div class="surah-name-en">${s.en}</div>
        <div class="surah-name-ar">${s.ar}</div>
      </div>
      <div class="surah-page-lbl">P.${s.page}</div>
    </div>
  `).join('');
}

function selectSurah(page) {
  document.getElementById('surah-modal').classList.remove('show');
  openReader(page);
}

// ── JUZ MODAL ──
function openJuzModal() {
  document.getElementById('juz-modal').classList.add('show');
  document.getElementById('juz-list').innerHTML = juzData.map(j => `
    <div class="juz-row" onclick="selectJuz(${j.page})">
      <div class="juz-num">${j.n}</div>
      <div class="juz-info">
        <div class="juz-title">${j.title}</div>
        <div class="juz-sub">Starts: ${j.starts}</div>
      </div>
      <div class="juz-page-lbl">P.${j.page}</div>
    </div>
  `).join('');
}

function closeJuzModal(e) {
  if (!e || e.target === document.getElementById('juz-modal')) {
    document.getElementById('juz-modal').classList.remove('show');
  }
}

function selectJuz(page) {
  document.getElementById('juz-modal').classList.remove('show');
  openReader(page);
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
checkResume();
