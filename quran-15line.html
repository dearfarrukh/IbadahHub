<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>15 Line Quran – IbadahHub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .reader-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      padding-top: calc(env(safe-area-inset-top, 16px) + 8px);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .reader-topbar.hidden {
      transform: translateY(-100%);
      opacity: 0;
    }

    .reader-topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: white;
      text-align: center;
      flex: 1;
    }

    .reader-topbar-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }

    .topbar-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .topbar-btn:active { background: rgba(255,255,255,0.3); }

    /* Page image area */
    .reader-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      min-height: 100vh;
      cursor: pointer;
    }

    .quran-page-img {
      max-width: 100%;
      max-height: calc(100vh - 16px);
      width: auto;
      height: auto;
      border-radius: 8px;
      object-fit: contain;
      display: block;
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      gap: 16px;
      min-height: 60vh;
    }

    .page-loading-text {
      font-size: 14px;
    }

    /* Bottom bar */
    .reader-bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 12px) + 12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 100;
    }

    .reader-bottombar.hidden {
      transform: translateY(100%);
      opacity: 0;
    }

    .nav-arrow-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-arrow-btn:active { background: rgba(255,255,255,0.3); }
    .nav-arrow-btn:disabled { opacity: 0.3; pointer-events: none; }

    .page-info {
      flex: 1;
      text-align: center;
    }

    .page-num {
      font-size: 18px;
      font-weight: 800;
      color: white;
    }

    .page-total {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Go to page modal */
    .goto-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .goto-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .goto-modal {
      background: #2c2c2e;
      border-radius: 24px 24px 0 0;
      padding: 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .goto-overlay.show .goto-modal {
      transform: translateY(0);
    }

    .goto-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      margin: 0 auto 20px;
    }

    .goto-title {
      font-size: 17px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 16px;
    }

    .goto-input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 12px;
    }

    .goto-input::placeholder { color: rgba(255,255,255,0.3); }

    /* Bookmark button */
    .bookmark-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top, 16px) + 58px);
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      transition: all 0.15s;
    }

    .bookmark-btn.bookmarked { background: #ff9500; }
    .bookmark-btn:active { transform: scale(0.9); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(28,28,30,0.95);
      color: white;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Swipe hint */
    .swipe-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 12px;
      opacity: 0;
      animation: hintFade 3s ease 1s forwards;
      pointer-events: none;
      white-space: nowrap;
      z-index: 50;
    }

    @keyframes hintFade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="reader-topbar" id="topbar">
  <button class="topbar-btn" onclick="location.href='quran.html'">←</button>
  <div>
    <div class="reader-topbar-title">15 Line Quran</div>
    <div class="reader-topbar-sub" id="topbar-sub">Page 1 of 604</div>
  </div>
  <button class="topbar-btn" onclick="openGoto()">⊞</button>
</div>

<!-- BOOKMARK BUTTON -->
<button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()">🔖</button>

<!-- PAGE AREA -->
<div class="reader-area" id="reader-area" onclick="toggleControls()">
  <div class="page-loading" id="page-loading">
    <div class="spinner" style="border-color:rgba(255,255,255,0.2); border-top-color:white;"></div>
    <div class="page-loading-text">Loading page...</div>
  </div>
  <img class="quran-page-img" id="quran-img" style="display:none;"
    onload="imgLoaded()" onerror="imgError()"/>
</div>

<!-- SWIPE HINT -->
<div class="swipe-hint">← Swipe right for previous page</div>

<!-- BOTTOM BAR -->
<div class="reader-bottombar" id="bottombar">
  <!-- Right arrow = previous page (RTL) -->
  <button class="nav-arrow-btn" id="btn-prev" onclick="prevPage()">›</button>
  <div class="page-info">
    <div class="page-num" id="page-num">1</div>
    <div class="page-total">of 604</div>
  </div>
  <!-- Left arrow = next page (RTL) -->
  <button class="nav-arrow-btn" id="btn-next" onclick="nextPage()">‹</button>
</div>

<!-- GO TO PAGE MODAL -->
<div class="goto-overlay" id="goto-overlay" onclick="closeGoto(event)">
  <div class="goto-modal">
    <div class="goto-handle"></div>
    <div class="goto-title">Go to Page</div>
    <input class="goto-input" id="goto-input" type="number"
      placeholder="1 – 604" min="1" max="604"/>
    <button class="btn btn-primary btn-full"
      onclick="goToPage()">Go</button>
    <button class="btn btn-gray btn-full" style="margin-top:8px;"
      onclick="closeGoto()">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const TOTAL_PAGES = 604;
// 15 Line Quran images from qurancdn
const IMG_BASE = 'https://qurancdn.com/images/quran/pages/page';

let currentPage = parseInt(localStorage.getItem('quran15line_page') || '1');
let controlsVisible = true;
let touchStartX = 0;
let touchStartY = 0;

// ── LOAD PAGE ──
function loadPage(p) {
  if (p < 1) p = 1;
  if (p > TOTAL_PAGES) p = TOTAL_PAGES;
  currentPage = p;

  // Save progress
  localStorage.setItem('quran15line_page', currentPage);
  localStorage.setItem('quranLastPage', currentPage);
  localStorage.setItem('quranLastType', '15line');

  // Update UI
  document.getElementById('page-num').textContent = currentPage;
  document.getElementById('topbar-sub').textContent = 'Page ' + currentPage + ' of ' + TOTAL_PAGES;

  // Buttons
  document.getElementById('btn-prev').disabled = currentPage >= TOTAL_PAGES;
  document.getElementById('btn-next').disabled = currentPage <= 1;

  // Load image
  const img = document.getElementById('quran-img');
  img.style.display = 'none';
  document.getElementById('page-loading').style.display = 'flex';

  // 15 line quran — padded 3 digits
  const padded = String(currentPage).padStart(3, '0');
  img.src = `https://archive.org/download/ALQURANPERPAGEFORMATPNG/page${padded}.png`;

  // Bookmark state
  updateBookmarkBtn();
}

function imgLoaded() {
  document.getElementById('page-loading').style.display = 'none';
  document.getElementById('quran-img').style.display = 'block';
}

function imgError() {
  // Try alternate source
  const padded = String(currentPage).padStart(3, '0');
  const img = document.getElementById('quran-img');
  if (!img.src.includes('tanzil')) {
    img.src = `https://archive.org/download/ALQURANPERPAGEFORMATPNG/page${padded}.png`;
  } else {
    document.getElementById('page-loading').innerHTML =
      '<div style="color:rgba(255,255,255,0.5); text-align:center; padding:20px;">Page image unavailable.<br>Check your internet connection.</div>';
  }
}

// ── NAVIGATION ──
function nextPage() {
  // RTL: next = lower page number
  if (currentPage > 1) loadPage(currentPage - 1);
}

function prevPage() {
  // RTL: prev = higher page number
  if (currentPage < TOTAL_PAGES) loadPage(currentPage + 1);
}

// ── TOGGLE CONTROLS ──
function toggleControls() {
  controlsVisible = !controlsVisible;
  const topbar = document.getElementById('topbar');
  const bottombar = document.getElementById('bottombar');
  const bookmarkBtn = document.getElementById('bookmark-btn');
  if (controlsVisible) {
    topbar.classList.remove('hidden');
    bottombar.classList.remove('hidden');
    bookmarkBtn.style.opacity = '1';
  } else {
    topbar.classList.add('hidden');
    bottombar.classList.add('hidden');
    bookmarkBtn.style.opacity = '0';
  }
}

// ── BOOKMARK ──
function toggleBookmark() {
  const bookmarks = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  const idx = bookmarks.indexOf(currentPage);
  if (idx === -1) {
    bookmarks.push(currentPage);
    showToast('📖 Page ' + currentPage + ' bookmarked!');
  } else {
    if (confirm('Remove bookmark for page ' + currentPage + '?')) {
      bookmarks.splice(idx, 1);
      showToast('Bookmark removed');
    } else return;
  }
  localStorage.setItem('quran15bookmarks', JSON.stringify(bookmarks));
  updateBookmarkBtn();
}

function updateBookmarkBtn() {
  const bookmarks = JSON.parse(localStorage.getItem('quran15bookmarks') || '[]');
  const btn = document.getElementById('bookmark-btn');
  if (bookmarks.includes(currentPage)) {
    btn.classList.add('bookmarked');
  } else {
    btn.classList.remove('bookmarked');
  }
}

// ── GO TO PAGE ──
function openGoto() {
  document.getElementById('goto-overlay').classList.add('show');
  setTimeout(() => document.getElementById('goto-input').focus(), 400);
}

function closeGoto(e) {
  if (!e || e.target === document.getElementById('goto-overlay')) {
    document.getElementById('goto-overlay').classList.remove('show');
  }
}

function goToPage() {
  const val = parseInt(document.getElementById('goto-input').value);
  if (val >= 1 && val <= TOTAL_PAGES) {
    loadPage(val);
    closeGoto();
    document.getElementById('goto-input').value = '';
  } else {
    showToast('Please enter a page between 1 and 604');
  }
}

// ── SWIPE ──
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx > 0) {
      // Swipe right = previous page (RTL)
      prevPage();
    } else {
      // Swipe left = next page (RTL)
      nextPage();
    }
  }
}, { passive: true });

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nextPage();
  if (e.key === 'ArrowRight') prevPage();
});

// ── INIT ──
loadPage(currentPage);
</script>
</body>
</html>
