<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Duas – IbadahHub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); min-height:100vh; font-family:'Inter',sans-serif; }

    .view { display:none; }
    .view.active { display:block; }

    /* ══ HEADER ══ */
    .page-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px;
      padding-top:calc(env(safe-area-inset-top,16px) + 10px);
      background:white;
      box-shadow:0 1px 0 var(--border);
      position:sticky; top:0; z-index:50;
    }

    .header-title-text { font-size:17px; font-weight:700; flex:1; }

    /* ══ SEARCH BAR ══ */
    .search-bar {
      padding:12px 16px;
      background:white;
      border-bottom:1px solid var(--border);
    }

    .search-input {
      width:100%; padding:10px 16px;
      border-radius:12px; border:none;
      background:var(--bg); font-size:15px;
      font-family:'Inter',sans-serif; outline:none;
      color:var(--text);
    }

    /* ══ CATEGORY TABS ══ */
    .cat-scroll {
      display:flex; gap:8px;
      padding:12px 16px;
      overflow-x:auto; background:white;
      border-bottom:1px solid var(--border);
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .cat-scroll::-webkit-scrollbar { display:none; }

    .cat-chip {
      padding:7px 16px;
      border-radius:50px; border:none;
      font-size:13px; font-weight:600;
      white-space:nowrap; cursor:pointer;
      transition:all 0.15s;
      font-family:'Inter',sans-serif;
      -webkit-user-select:none; user-select:none;
      background:var(--bg); color:var(--text-secondary);
    }

    .cat-chip.active { background:var(--primary); color:white; }
    .cat-chip:active { opacity:0.8; }

    /* ══ DUA LIST ══ */
    .dua-list { padding:12px 16px; padding-bottom:40px; }

    .dua-card {
      background:white; border-radius:var(--radius-lg);
      box-shadow:var(--shadow); margin-bottom:12px;
      overflow:hidden; cursor:pointer;
      transition:transform 0.15s;
      -webkit-user-select:none; user-select:none;
    }

    .dua-card:active { transform:scale(0.99); }

    .dua-card-header {
      display:flex; align-items:center;
      padding:16px 18px; gap:12px;
    }

    .dua-cat-dot {
      width:10px; height:10px; border-radius:50%;
      flex-shrink:0;
    }

    .dua-title { font-size:15px; font-weight:700; color:var(--text); flex:1; }

    .dua-fav-btn {
      width:32px; height:32px; border-radius:50%;
      border:none; background:var(--bg);
      font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; flex-shrink:0;
    }

    .dua-fav-btn.on { background:#fff3e0; }

    .dua-arabic-preview {
      font-family:'Scheherazade New',serif;
      font-size:18px; line-height:1.9;
      text-align:right; direction:rtl;
      color:var(--text); padding:0 18px 16px;
      border-top:1px solid var(--border);
      padding-top:12px;
    }

    .dua-cat-label {
      font-size:11px; font-weight:600;
      color:var(--text-secondary);
      background:var(--bg); border-radius:50px;
      padding:3px 10px; flex-shrink:0;
    }

    /* ══ DUA DETAIL ══ */
    .detail-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px;
      padding-top:calc(env(safe-area-inset-top,16px) + 10px);
      background:white;
      box-shadow:0 1px 0 var(--border);
      position:sticky; top:0; z-index:50;
    }

    .detail-content { padding:16px; padding-bottom:40px; }

    .detail-title-card {
      background:linear-gradient(135deg,#1a3a6b,#0d2744);
      border-radius:var(--radius-lg);
      padding:20px; margin-bottom:14px;
      text-align:center;
    }

    .detail-title { font-size:20px; font-weight:800; color:white; margin-bottom:6px; }
    .detail-cat { font-size:13px; color:rgba(255,255,255,0.6); }

    .detail-card {
      background:white; border-radius:var(--radius-lg);
      padding:20px; box-shadow:var(--shadow); margin-bottom:12px;
    }

    .detail-section-label {
      font-size:11px; font-weight:700;
      color:var(--text-secondary);
      text-transform:uppercase; letter-spacing:0.5px;
      margin-bottom:12px;
    }

    .detail-arabic {
      font-family:'Scheherazade New',serif;
      font-size:28px; line-height:2;
      text-align:right; direction:rtl;
      color:var(--text);
    }

    .detail-urdu {
      font-family:'Noto Nastaliq Urdu',serif;
      font-size:16px; line-height:2.4;
      text-align:right; direction:rtl;
      color:var(--text-secondary);
    }

    .detail-english {
      font-size:15px; line-height:1.8;
      color:var(--text-secondary); font-style:italic;
    }

    .detail-reference {
      font-size:12px; color:var(--text-light);
      text-align:center; padding-top:12px;
      border-top:1px solid var(--border);
      font-family:'Scheherazade New',serif;
      direction:rtl;
    }

    .detail-actions {
      display:flex; gap:10px; margin-top:14px;
    }

    .detail-action-btn {
      flex:1; padding:12px;
      border-radius:12px; border:none;
      font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.15s;
      font-family:'Inter',sans-serif;
      display:flex; align-items:center;
      justify-content:center; gap:6px;
      -webkit-user-select:none; user-select:none;
    }

    .detail-action-btn:active { transform:scale(0.96); }

    /* Empty state */
    .empty-state {
      text-align:center; padding:60px 24px;
    }

    .empty-icon { font-size:52px; margin-bottom:14px; opacity:0.4; }
    .empty-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .empty-text { font-size:14px; color:var(--text-secondary); line-height:1.6; }

    /* Toast */
    .toast {
      position:fixed; bottom:30px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(28,28,30,0.95); color:white;
      padding:12px 22px; border-radius:50px;
      font-size:14px; font-weight:500; z-index:9999;
      opacity:0; transition:all 0.3s ease;
      white-space:nowrap; pointer-events:none;
    }

    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══ VIEW: DUA LIST ══ -->
<div class="view active" id="view-list">

  <div class="page-header">
    <button class="back-btn" onclick="location.href='more.html'">←</button>
    <div class="header-title-text">Duas</div>
    <button class="back-btn" onclick="showFavorites()" title="Favorites">❤️</button>
  </div>

  <div class="search-bar">
    <input class="search-input" id="search-input"
      placeholder="🔍 Search duas..."
      oninput="filterDuas()"/>
  </div>

  <div class="cat-scroll" id="cat-bar"></div>

  <div class="dua-list" id="dua-list"></div>

</div>

<!-- ══ VIEW: DUA DETAIL ══ -->
<div class="view" id="view-detail" style="min-height:100vh;">

  <div class="detail-header">
    <button class="back-btn" onclick="showView('view-list')">←</button>
    <div class="header-title-text" id="detail-header-title">Dua</div>
    <button class="dua-fav-btn" id="detail-fav-btn" onclick="toggleDetailFav()">🤍</button>
  </div>

  <div class="detail-content">

    <div class="detail-title-card">
      <div class="detail-title" id="d-title">Dua</div>
      <div class="detail-cat" id="d-cat">Category</div>
    </div>

    <div class="detail-card">
      <div class="detail-section-label">Arabic</div>
      <div class="detail-arabic" id="d-arabic"></div>
    </div>

    <div class="detail-card" id="d-urdu-card">
      <div class="detail-section-label">Urdu Translation</div>
      <div class="detail-urdu" id="d-urdu"></div>
    </div>

    <div class="detail-card" id="d-english-card">
      <div class="detail-section-label">English Translation</div>
      <div class="detail-english" id="d-english"></div>
    </div>

    <div class="detail-card" id="d-explanation-card">
      <div class="detail-section-label">Explanation</div>
      <div class="detail-english" id="d-explanation"></div>
      <div class="detail-reference" id="d-reference"></div>
    </div>

    <div class="detail-actions">
      <button class="detail-action-btn" style="background:#e6f9ec; color:var(--green);"
        onclick="copyDua()">📋 Copy</button>
      <button class="detail-action-btn" style="background:#e8f0fe; color:var(--primary);"
        onclick="shareDua()">🔗 Share</button>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

    urdu:'اے اللہ مجھے اپنے حلال سے حرام سے بے نیاز کر دے اور اپنے فضل سے مجھے اپنے سوا سب سے غنی کر دے۔',
    english:'O Allah, suffice me with what You have allowed instead of what You have forbidden, and make me independent of all others besides You.',

];

// ══════════════════════════════
// STATE
// ══════════════════════════════
const categories = ['All', ...new Set(duas.map(d => d.cat))];
let currentCat = 'All';
let currentDuaId = null;
let searchQuery = '';

// ══════════════════════════════
// VIEW MANAGEMENT
// ══════════════════════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ══════════════════════════════
// RENDER CATEGORIES
// ══════════════════════════════
function renderCats() {
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = categories.map(c => `
    <button class="cat-chip ${c === currentCat ? 'active' : ''}"
      onclick="selectCat('${c}')">${c}</button>
  `).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCats();
  renderDuas();
}

// ══════════════════════════════
// RENDER DUAS
// ══════════════════════════════
const catColors = {
  Morning:'#f59e0b', Evening:'#6366f1', Salah:'#0ea5e9',
  Food:'#22c55e', Travel:'#f97316', Home:'#8b5cf6',
  Forgiveness:'#ec4899', Hardship:'#ef4444',
  Sleep:'#14b8a6', Quran:'#3b82f6', Family:'#f43f5e', Rizq:'#10b981'
};

function renderDuas() {
  const favs = getFavs();
  let filtered = duas;

  if (currentCat !== 'All') {
    filtered = filtered.filter(d => d.cat === currentCat);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.urdu.includes(q) ||
      d.english.toLowerCase().includes(q)
    );
  }

  const container = document.getElementById('dua-list');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🤲</div>
        <div class="empty-title">No duas found</div>
        <div class="empty-text">Try a different search or category</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(d => `
    <div class="dua-card" onclick="openDua(${d.id})">
      <div class="dua-card-header">
        <div class="dua-cat-dot" style="background:${catColors[d.cat] || '#888'}"></div>
        <div class="dua-title">${d.title}</div>
        <div class="dua-cat-label">${d.cat}</div>
        <button class="dua-fav-btn ${favs.includes(d.id) ? 'on' : ''}"
          id="fav-${d.id}"
          onclick="event.stopPropagation(); toggleFav(${d.id})">
          ${favs.includes(d.id) ? '❤️' : '🤍'}
        </button>
      </div>
      <div class="dua-arabic-preview">${d.arabic.substring(0, 80)}${d.arabic.length > 80 ? '...' : ''}</div>
    </div>
  `).join('');
}

function filterDuas() {
  searchQuery = document.getElementById('search-input').value;
  renderDuas();
}

// ══════════════════════════════
// OPEN DUA DETAIL
// ══════════════════════════════
function openDua(id) {
  const d = duas.find(x => x.id === id);
  if (!d) return;
  currentDuaId = id;

  document.getElementById('detail-header-title').textContent = d.title;
  document.getElementById('d-title').textContent   = d.title;
  document.getElementById('d-cat').textContent     = d.cat;
  document.getElementById('d-arabic').textContent  = d.arabic;
  document.getElementById('d-urdu').textContent    = d.urdu;
  document.getElementById('d-english').textContent = d.english;
  document.getElementById('d-explanation').textContent = d.explanation || '';
  document.getElementById('d-reference').textContent   = d.reference || '';

  // Hide empty sections
  document.getElementById('d-urdu-card').style.display    = d.urdu ? 'block' : 'none';
  document.getElementById('d-english-card').style.display = d.english ? 'block' : 'none';
  document.getElementById('d-explanation-card').style.display = (d.explanation || d.reference) ? 'block' : 'none';

  // Fav button
  const favs = getFavs();
  const favBtn = document.getElementById('detail-fav-btn');
  favBtn.textContent = favs.includes(id) ? '❤️' : '🤍';

  showView('view-detail');
}

// ══════════════════════════════
// FAVORITES
// ══════════════════════════════
function getFavs() {
  return JSON.parse(localStorage.getItem('duaFavorites') || '[]');
}

function toggleFav(id) {
  let favs = getFavs();
  const idx = favs.indexOf(id);
  if (idx === -1) {
    favs.push(id);
    showToast('❤️ Added to favorites');
  } else {
    favs.splice(idx, 1);
    showToast('Removed from favorites');
  }
  localStorage.setItem('duaFavorites', JSON.stringify(favs));

  // Update buttons
  const btn = document.getElementById('fav-' + id);
  if (btn) {
    btn.textContent = favs.includes(id) ? '❤️' : '🤍';
    btn.classList.toggle('on', favs.includes(id));
  }
}

function toggleDetailFav() {
  if (!currentDuaId) return;
  toggleFav(currentDuaId);
  const favs = getFavs();
  document.getElementById('detail-fav-btn').textContent = favs.includes(currentDuaId) ? '❤️' : '🤍';
}

function showFavorites() {
  currentCat = 'All';
  searchQuery = '';
  document.getElementById('search-input').value = '';
  const favs = getFavs();

  const container = document.getElementById('dua-list');

  if (favs.length === 0) {
    renderCats();
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🤍</div>
        <div class="empty-title">No Favorites Yet</div>
        <div class="empty-text">Tap the 🤍 heart icon on any dua to save it here.</div>
      </div>`;
    return;
  }

  const favDuas = duas.filter(d => favs.includes(d.id));
  renderCats();

  container.innerHTML = `
    <div style="padding:8px 0 4px; font-size:13px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px;">
      ❤️ Favorites (${favDuas.length})
    </div>
  ` + favDuas.map(d => `
    <div class="dua-card" onclick="openDua(${d.id})">
      <div class="dua-card-header">
        <div class="dua-cat-dot" style="background:${catColors[d.cat] || '#888'}"></div>
        <div class="dua-title">${d.title}</div>
        <div class="dua-cat-label">${d.cat}</div>
        <button class="dua-fav-btn on" onclick="event.stopPropagation(); toggleFav(${d.id})">❤️</button>
      </div>
      <div class="dua-arabic-preview">${d.arabic.substring(0,80)}...</div>
    </div>
  `).join('');
}

// ══════════════════════════════
// COPY & SHARE
// ══════════════════════════════
function copyDua() {
  const d = duas.find(x => x.id === currentDuaId);
  if (!d) return;
  const text = `${d.title}\n\n${d.arabic}\n\n${d.urdu}\n\n${d.english}\n\n${d.reference}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard!'));
  } else {
    showToast('Copy not supported on this device');
  }
}

function shareDua() {
  const d = duas.find(x => x.id === currentDuaId);
  if (!d) return;
  const text = `${d.title}\n\n${d.arabic}\n\n${d.english}`;
  if (navigator.share) {
    navigator.share({ title: d.title, text: text });
  } else {
    copyDua();
  }
}

// ══════════════════════════════
// TOAST
// ══════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
renderCats();
renderDuas();
</script>
</body>
</html>
